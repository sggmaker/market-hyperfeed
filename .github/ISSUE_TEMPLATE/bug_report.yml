name: Bug report
description: Report a reproducible MarketHyperFeed issue.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands and minimal config needed to reproduce. Do not include credentials.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Docker/ClickHouse version, and relevant logs without secrets.
    validations:
      required: true
